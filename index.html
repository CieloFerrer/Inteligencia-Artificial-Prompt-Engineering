<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignPrompt Pro - IA Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DesignPrompt Pro</h1>
            <p>Transformá tus ideas simples en prompts profesionales para Midjourney.</p>
        </header>

        <div id="chat" class="chat-container">
            <div class="message model">¡Hola! Soy tu asistente de diseño. Escribí tu idea (ej: "un gato comiendo pochoclo") y generaré el prompt técnico.</div>
        </div>

        <form id="form" class="input-area">
            <input id="input" type="text" placeholder="Describí tu idea acá..." autocomplete="off" required>
            <button type="submit">Generar</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
